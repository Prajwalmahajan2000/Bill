<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSC Billing System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="bill-top">

    <div class="shop-name">
        <h1>श्री ऑनलाइन</h1>
        <small>Common Services Centre (CSC) </small>
    </div>

    <div class="shop-info">
        <div>👤 <b>Owner:</b> निलेश मराठे</div>
        <div>📞 <b>Mobile:</b> 9637936150</div>
        <div>✉️ <b>Email:</b> marathen20@gmail.com</div>
        <div>📍 <b>Address:</b> युनियन बँक जवळ,सोसायटी मध्ये केऱ्हाळे बु.</div>
    </div>

</div>

<!-- CUSTOMER -->
<div class="customer-box">
<h2>Customer Details</h2>

<input type="text" id="customerName" placeholder="Customer Name">
<input type="text" id="mobileNumber" placeholder="Mobile Number">
<input type="date" id="billDate">
</div>

<!-- SEARCH -->
<div class="custom-service">
<h2>Search Service</h2>
</div>

<!-- BILL -->
<div class="bill-box">

<div class="bill-header">
<h2>Customer Bill</h2>
<strong>Bill No: <span id="billNumber">1001</span></strong>
</div>

<table>
<thead>
<tr>
<th>Service</th>
<th>Price</th>
<th>Qty</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>

<tbody id="billItems"></tbody>
</table>

<div class="total-box">
<h2>Total: ₹<span id="total">0</span></h2>
</div>

<div class="buttons">
<button onclick="window.print()">🖨 Print Bill</button>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
